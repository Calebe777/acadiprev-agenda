[pytest]
DJANGO_SETTINGS_MODULE = acadiprev.settings.development
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
asyncio_mode = auto

[coverage:run]
source = apps
omit =
    */migrations/*
    */tests/*
    */__init__.py

[coverage:report]
show_missing = True
skip_covered = True
