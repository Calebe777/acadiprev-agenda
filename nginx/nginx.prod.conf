# ============================================================
# nginx/nginx.prod.conf — nginx em produção
# Escuta na 80 dentro do container; o host mapeia HTTP_PORT do .env.
# Serve o frontend (SPA) e faz proxy para Daphne (api:8000).
# ============================================================

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    tcp_nopush    on;
    keepalive_timeout  65;

    # Gzip básico (assets do front)
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Upload (anexos)
    client_max_body_size 50M;

    # Logs em stdout/stderr (pra docker logs funcionar)
    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    upstream daphne {
        server api:8000;
    }

    server {
        listen 80 default_server;
        server_name _;

        # ---- Frontend (SPA React/Vite) ----
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # ---- Static do Django (admin, DRF) ----
        location /static/ {
            alias /app/staticfiles/;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # ---- Media (uploads) ----
        location /media/ {
            alias /app/media/;
        }

        # ---- WebSocket (Channels) ----
        location /ws/ {
            proxy_pass http://daphne;
            proxy_http_version 1.1;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        "upgrade";
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600;
            proxy_send_timeout 3600;
        }

        # ---- API + admin Django ----
        location ~ ^/(api|admin) {
            proxy_pass http://daphne;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300;
        }

        # Healthcheck simples
        location = /healthz {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}
